{% extends 'base.html' %}

{% block content %}
    <div class="form-container">
        <h2>Iniciar sesión</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Entrar</button>
        </form>
        <p>¿No tienes cuenta? <a href="{% url 'register' %}">Regístrate</a></p>
    </div>
{% endblock %}
